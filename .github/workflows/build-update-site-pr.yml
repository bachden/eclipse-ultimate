name: Validate Eclipse Update Site

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build update site
        run: mvn --batch-mode --update-snapshots -Dtarget-definition=eclipse-ci.target clean verify

      - name: Upload update site artifact
        uses: actions/upload-artifact@v4
        with:
          name: eclipse-ultimate-update-site
          path: dist
